name: decision-assistant

networks:
  app_network:
    driver: bridge

volumes:
  chroma_data:
  app_logs:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: decision-assistant-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
    expose:
      - "8000"
    volumes:
      - /c/projects/decision-assistant/data/chroma_db:/app/data/chroma_db:delegated
      - /c/projects/decision-assistant/logs:/app/logs:delegated
      - /c/projects/decision-assistant/models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: decision-assistant-frontend:latest
    restart: unless-stopped
    environment:
      PORT: "80"
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app_network