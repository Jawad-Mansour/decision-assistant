services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CHROMA_PERSIST_DIRECTORY: /app/data/chroma_db
      LOG_DIR: /app/logs
    volumes:
      - chroma_data:/app/data/chroma_db
      - app_logs:/app/logs
      - ./models:/app/models:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
  app_logs:
